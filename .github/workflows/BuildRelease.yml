name: Build Releases

on:
  push:
    branches:
      - "main"
      - "test*"
    tags:
      - '[0-9]*'   # 只要是以数字开头的 Tag 都触发 Release
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

# 强制使用 Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      # 设置 pnpm 环境
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node & Cache
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build JSON Files
        run: pnpm run build

      # ==================== Artifact 上传（优化重点）====================
      - name: Upload pixiv.json
        uses: actions/upload-artifact@v4
        with:
          name: pixiv.json.zip
          path: pixiv.json
          retention-days: 7

      - name: Upload linpx.json
        uses: actions/upload-artifact@v4
        with:
          name: linpx.json.zip
          path: linpx.json
          retention-days: 7

      # 可选：同时提供一个打包的完整 artifact
      - name: Upload All Files (dist)
        uses: actions/upload-artifact@v4
        with:
          name: dist.zip
          path: |
            pixiv.json
            linpx.json
          retention-days: 7

      # ==================== Tag 触发时创建 Release ====================
      - name: Extract Changelog and Determine Type
        if: github.ref_type == 'tag'
        run: |
          RAW_TAG="${{ github.ref_name }}"
          
          # 动态判断是否为预发布版
          if [[ "$RAW_TAG" == *-* ]]; then
              echo "IS_PRERELEASE=true" >> $GITHUB_ENV
              TAG_NAME="${RAW_TAG%%-*}"
              echo "--> 预发布版，基准版本: $TAG_NAME"
          else
              echo "IS_PRERELEASE=false" >> $GITHUB_ENV
              TAG_NAME="$RAW_TAG"
              echo "--> 正式版，基准版本: $TAG_NAME"
          fi
          
          # 提取更新日志
          awk -v t_name="$TAG_NAME" '
          $0 ~ "### 📚 更新 " t_name { 
              sub(/ \{#[^}]+\}/, ""); 
              print; 
              flag=1; 
              next 
          }
          /^##/ { if (flag) exit }
          flag
          ' doc/UpdateLog.md > RELEASE_NEXT.md
          
          if [ -s RELEASE_NEXT.md ]; then
              echo "LOG_FOUND=true" >> $GITHUB_ENV
              echo "=== 成功提取更新日志 ==="
              cat RELEASE_NEXT.md
              echo "========================="
          else
              echo "LOG_FOUND=false" >> $GITHUB_ENV
              echo "--> 未找到对应版本日志，将使用 GitHub 自动生成"
              rm -f RELEASE_NEXT.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          title: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: ${{ env.LOG_FOUND != 'true' }}
          body_path: ${{ env.LOG_FOUND == 'true' && 'RELEASE_NEXT.md' || '' }}
          files: |
            pixiv.json
            linpx.json